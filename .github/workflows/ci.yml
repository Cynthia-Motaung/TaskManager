name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/packages.lock.json

      - name: Restore
        run: dotnet restore TaskManager.sln

      - name: Build
        run: dotnet build TaskManager.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TaskManager.Tests/TaskManager.Tests.csproj --configuration Release --no-build --verbosity normal
